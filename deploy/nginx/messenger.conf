# ============================================================
# Nginx configuration for Messenger
# File: /etc/nginx/sites-available/messenger.conf
#
# Replace YOUR_DOMAIN with your actual domain, e.g. example.com
# ============================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # ── SSL (выдаётся Certbot) ───────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Безопасность ─────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Размер загружаемых файлов (медиа до 55 МБ) ───────────
    client_max_body_size 55M;

    # ── Логи ─────────────────────────────────────────────────
    access_log /var/log/nginx/messenger_access.log;
    error_log  /var/log/nginx/messenger_error.log warn;

    # ========================================================
    # 1. Статические файлы фронтенда
    # ========================================================
    root /var/www/messenger/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Кэширование статики
        location ~* \.(css|js|woff2?|ttf|svg|png|jpg|jpeg|gif|ico|webp)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ========================================================
    # 2. API — проксирование на FastAPI (порт 8000)
    # ========================================================
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты для долгих запросов
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ========================================================
    # 3. WebSocket — отдельный location с upgrade
    # ========================================================
    location /ws {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Обязательно для WebSocket
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket соединения живут долго — увеличиваем таймауты
        proxy_connect_timeout  7d;
        proxy_send_timeout     7d;
        proxy_read_timeout     7d;
    }

    # ========================================================
    # 4. Загруженные файлы (аватары, медиа)
    #    FastAPI отдаёт /uploads/* напрямую через StaticFiles,
    #    но можно также отдавать через Nginx для скорости.
    # ========================================================
    # IMPORTANT: ^~ gives this prefix priority over regex locations
    # (e.g. \.png|\.jpg), so uploaded media is proxied to FastAPI.
    location ^~ /uploads/ {
        proxy_pass       http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Кэш медиа на 7 дней
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ========================================================
    # 5. Swagger UI (опционально, закрыть на проде)
    # ========================================================
    # location /api/docs { deny all; }
    # location /api/redoc { deny all; }
}
