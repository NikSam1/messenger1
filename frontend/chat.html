<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <title>Messenger</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,400&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="css/chat.css" />
    </head>
    <body>
        <div class="app-layout">
            <!-- ═══════════════════════════════════════════
       SIDEBAR
  ═══════════════════════════════════════════ -->
            <div class="sidebar" id="sidebar">
                <!-- Header: my profile + new-chat / search button -->
                <div class="sidebar-header">
                    <button
                        class="my-avatar-btn"
                        id="myProfileBtn"
                        title="Мой профиль"
                    >
                        <div class="avatar-initials" id="myAvatarEl">??</div>
                        <span class="my-username" id="myUsernameEl">...</span>
                    </button>
                    <button
                        class="new-chat-btn"
                        id="newChatBtn"
                        title="Найти пользователя"
                    >
                        <svg
                            width="20"
                            height="20"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            aria-hidden="true"
                        >
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                    </button>
                </div>

                <!-- Search / filter conversations -->
                <div class="search-box" style="position: relative">
                    <input
                        class="search-input"
                        id="searchInput"
                        type="text"
                        placeholder="Поиск по тегу..."
                        autocomplete="off"
                        spellcheck="false"
                    />
                    <!-- Search results dropdown -->
                    <div
                        class="search-results"
                        id="searchResults"
                        style="display: none"
                    ></div>
                </div>

                <!-- Conversations list -->
                <div class="conversations-list" id="conversationsList">
                    <!-- populated by JS -->
                </div>
            </div>
            <!-- /SIDEBAR -->

            <!-- ═══════════════════════════════════════════
       CHAT AREA
  ═══════════════════════════════════════════ -->
            <div class="chat-area">
                <!-- No conversation selected — placeholder -->
                <div class="chat-placeholder" id="chatPlaceholder">
                    <svg
                        width="120"
                        height="120"
                        viewBox="0 0 48 48"
                        fill="none"
                        aria-hidden="true"
                    >
                        <path
                            d="M10 14a4 4 0 0 1 4-4h20a4 4 0 0 1 4 4v14a4 4 0 0 1-4 4H28l-4 5-4-5H14a4 4 0 0 1-4-4V14z"
                            fill="#c8bfe8"
                        />
                        <circle cx="18" cy="21" r="2" fill="#9b7de0" />
                        <circle cx="24" cy="21" r="2" fill="#9b7de0" />
                        <circle cx="30" cy="21" r="2" fill="#9b7de0" />
                    </svg>
                    <p>Выберите чат или начните новый</p>
                </div>

                <!-- Active conversation -->
                <div class="chat-main" id="chatMain" style="display: none">
                    <!-- Chat header -->
                    <div class="chat-header">
                        <button class="back-btn" id="backBtn" title="Назад">
                            <svg
                                width="20"
                                height="20"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2.5"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <polyline points="15 18 9 12 15 6" />
                            </svg>
                        </button>
                        <div class="conv-avatar-wrap">
                            <div
                                class="avatar-initials"
                                id="chatAvatarEl"
                                style="
                                    width: 40px;
                                    height: 40px;
                                    font-size: 16px;
                                "
                            >
                                ??
                            </div>
                            <span
                                class="online-dot"
                                id="chatOnlineDot"
                                style="display: none"
                            ></span>
                        </div>
                        <div class="chat-partner-info">
                            <div class="chat-partner-name" id="chatPartnerName">
                                ...
                            </div>
                            <div
                                class="chat-partner-status"
                                id="chatPartnerStatus"
                            >
                                не в сети
                            </div>
                        </div>
                        <div class="chat-header-actions">
                            <button
                                class="icon-btn"
                                id="viewProfileBtn"
                                title="Профиль пользователя"
                            >
                                <svg
                                    width="18"
                                    height="18"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    aria-hidden="true"
                                >
                                    <circle cx="12" cy="8" r="4" />
                                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Typing indicator -->
                    <div
                        class="typing-indicator"
                        id="typingIndicator"
                        style="display: none"
                    >
                        печатает...
                    </div>

                    <!-- Edit mode indicator -->
                    <div class="edit-indicator" id="editIndicator">
                        <svg
                            width="14"
                            height="14"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2.5"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            aria-hidden="true"
                        >
                            <path
                                d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
                            />
                            <path
                                d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
                            />
                        </svg>
                        Редактирование сообщения
                        <button
                            class="edit-indicator-cancel"
                            id="cancelEditBtn"
                            title="Отмена"
                        >
                            ✕
                        </button>
                    </div>

                    <!-- Messages area -->
                    <div class="messages-area" id="messagesArea">
                        <!-- messages injected by JS -->
                    </div>

                    <!-- Media / file preview bar (shown when attachment selected) -->
                    <div class="media-preview-bar" id="mediaPreviewBar">
                        <img
                            class="media-preview-thumb"
                            id="mediaPreviewThumb"
                            src=""
                            alt=""
                            style="display: none"
                        />
                        <span
                            class="media-preview-name"
                            id="mediaPreviewName"
                        ></span>
                        <button
                            class="media-preview-remove"
                            id="mediaPreviewRemove"
                            title="Убрать файл"
                        >
                            ✕
                        </button>
                    </div>

                    <!-- Message input area -->
                    <div class="message-input-area">
                        <button
                            class="icon-btn attach-btn"
                            id="attachBtn"
                            title="Прикрепить файл"
                        >
                            <svg
                                width="20"
                                height="20"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                aria-hidden="true"
                            >
                                <path
                                    d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"
                                />
                            </svg>
                        </button>

                        <div class="message-input-wrapper">
                            <textarea
                                class="message-input"
                                id="messageInput"
                                placeholder="Сообщение..."
                                rows="1"
                                autocomplete="off"
                                spellcheck="true"
                            ></textarea>
                        </div>

                        <button
                            class="send-btn"
                            id="sendBtn"
                            title="Отправить"
                            disabled
                        >
                            <svg
                                width="20"
                                height="20"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2.5"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                aria-hidden="true"
                            >
                                <line x1="22" y1="2" x2="11" y2="13" />
                                <polygon points="22 2 15 22 11 13 2 9 22 2" />
                            </svg>
                        </button>
                    </div>
                </div>
                <!-- /chat-main -->
            </div>
            <!-- /CHAT AREA -->
        </div>
        <!-- /app-layout -->

        <!-- ═══════════════════════════════════════════════════════════
     MODALS
═══════════════════════════════════════════════════════════ -->

        <!-- ── My Profile Modal ── -->
        <div class="modal-overlay" id="profileModalOverlay">
            <div class="modal">
                <button
                    class="modal-close"
                    id="closeProfileModal"
                    title="Закрыть"
                >
                    ✕
                </button>
                <h2 class="modal-title">Мой профиль</h2>

                <div class="profile-avatar-section">
                    <div class="avatar-large-initials" id="profileAvatarLarge">
                        ??
                    </div>
                    <div class="change-avatar-hint" id="changeAvatarHint">
                        Изменить фото
                    </div>
                    <input
                        type="file"
                        id="avatarFileInput"
                        accept="image/*"
                        hidden
                    />
                </div>

                <div style="display: flex; flex-direction: column; gap: 14px">
                    <div class="form-group">
                        <label for="profileUsername">Имя</label>
                        <input
                            type="text"
                            id="profileUsername"
                            class="modal-input"
                            placeholder="Ваше имя"
                            maxlength="40"
                        />
                    </div>

                    <div class="form-group">
                        <label for="profileTag">
                            Тег
                            <span
                                style="
                                    color: #aaa;
                                    font-size: 12px;
                                    font-weight: 400;
                                "
                                >(@тег для поиска)</span
                            >
                        </label>
                        <div style="position: relative">
                            <span
                                style="
                                    position: absolute;
                                    left: 12px;
                                    top: 50%;
                                    transform: translateY(-50%);
                                    color: #7c5cbf;
                                    font-weight: 600;
                                    pointer-events: none;
                                "
                                >@</span
                            >
                            <input
                                type="text"
                                id="profileTag"
                                class="modal-input"
                                style="padding-left: 28px"
                                placeholder="ваш_тег"
                                maxlength="30"
                                autocomplete="off"
                                spellcheck="false"
                            />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="profileBio">О себе</label>
                        <textarea
                            id="profileBio"
                            class="modal-input"
                            placeholder="Расскажите о себе..."
                            rows="3"
                            style="resize: vertical"
                            maxlength="300"
                        ></textarea>
                    </div>

                    <div
                        id="profileMessage"
                        style="
                            display: none;
                            font-size: 13px;
                            padding: 8px 12px;
                            border-radius: 8px;
                            line-height: 1.5;
                        "
                    ></div>

                    <button class="btn-primary modal-btn" id="saveProfileBtn">
                        Сохранить
                    </button>
                    <button class="btn-secondary modal-btn" id="logoutBtn">
                        Выйти
                    </button>
                </div>
            </div>
        </div>

        <!-- ── View User Profile Modal ── -->
        <div class="modal-overlay" id="viewProfileModalOverlay">
            <div class="modal">
                <button
                    class="modal-close"
                    id="closeViewProfileModal"
                    title="Закрыть"
                >
                    ✕
                </button>

                <div style="text-align: center; margin-bottom: 20px">
                    <div
                        class="avatar-large-initials"
                        id="viewProfileAvatar"
                        style="margin: 0 auto 12px"
                    >
                        ??
                    </div>
                    <h2
                        style="
                            font-size: 22px;
                            font-weight: 700;
                            color: #1a1a2e;
                            margin: 0;
                        "
                        id="viewProfileName"
                    >
                        ...
                    </h2>
                    <p
                        style="color: #7c5cbf; font-size: 14px; margin: 4px 0 0"
                        id="viewProfileTag"
                    >
                        @...
                    </p>
                    <p
                        style="
                            color: #888;
                            font-size: 13px;
                            margin-top: 10px;
                            line-height: 1.5;
                        "
                        id="viewProfileBio"
                    ></p>
                    <p
                        style="color: #aaa; font-size: 12px; margin-top: 8px"
                        id="viewProfileLastSeen"
                    ></p>
                </div>

                <button class="btn-primary modal-btn" id="startChatWithUserBtn">
                    Написать сообщение
                </button>
            </div>
        </div>

        <!-- ── Image Lightbox ── -->
        <div class="lightbox-overlay" id="lightboxOverlay">
            <button class="lightbox-close" id="lightboxClose" title="Закрыть">
                ✕
            </button>
            <img class="lightbox-img" id="lightboxImg" src="" alt="" />
        </div>

        <!-- ── Toast container ── -->
        <div class="toast-container" id="toastContainer"></div>

        <!-- Hidden file input for message attachments -->
        <input
            type="file"
            id="fileInput"
            accept="image/*,video/*,.pdf,.zip,.txt,.doc,.docx"
            hidden
        />

        <script src="js/config.js"></script>
        <script src="js/chat.js"></script>
    </body>
</html>
